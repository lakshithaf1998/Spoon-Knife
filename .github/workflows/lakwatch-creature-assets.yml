name: Build LakWatch creature assets

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build creature asset pack
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install --quiet requests pillow
          git clone --depth 1 https://github.com/arkutils/species-images.git species-images
          cat > /tmp/build_assets.py <<'PY'
          import json, re, shutil, urllib.parse
          from pathlib import Path
          import requests
          from PIL import Image

          OUT=Path('lakwatch_creature_assets')
          IMGOUT=OUT/'images'
          IMGOUT.mkdir(parents=True, exist_ok=True)
          SRC=Path('species-images/images')
          S=requests.Session(); S.headers['User-Agent']='LakWatchAssetBuilder/1.0'

          # ASA-specific clean renders only. Exclude masks, sex-specific alternatives,
          # pose/pattern alternatives; keep the neutral/base image for each creature/variant.
          selected=[]
          for p in sorted(SRC.glob('*_ASA.png')):
              stem=p.stem
              if stem.endswith('_m') or re.search(r'_s[fm]$',stem) or re.search(r'_p\d+$',stem) or re.search(r'_v\d+$',stem):
                  continue
              display=stem[:-4]  # strip _ASA
              selected.append((display,p))

          # Also include ASA files where parenthetical form is the canonical clean base.
          # De-dupe by display name.
          uniq={}
          for display,p in selected:
              uniq.setdefault(display,p)

          manifest=[]; wiki_unmatched=[]
          for display,p in sorted(uniq.items(), key=lambda x:x[0].lower()):
              wiki='https://ark.wiki.gg/wiki/'+urllib.parse.quote(display.replace(' ','_'),safe='()_-')
              wiki_ok=False; final_wiki=wiki
              try:
                  r=S.get(wiki,timeout=12,allow_redirects=True)
                  wiki_ok=(r.status_code==200 and 'There is currently no text in this page' not in r.text)
                  final_wiki=r.url
              except Exception:
                  pass
              if not wiki_ok:
                  wiki_unmatched.append(display)

              im=Image.open(p).convert('RGBA')
              im.thumbnail((492,492),Image.Resampling.LANCZOS)
              canvas=Image.new('RGBA',(512,512),(0,0,0,0))
              canvas.alpha_composite(im,((512-im.width)//2,(512-im.height)//2))
              fname=re.sub(r'[^a-z0-9]+','_',display.lower()).strip('_')+'.webp'
              canvas.save(IMGOUT/fname,'WEBP',lossless=True,method=6)
              manifest.append({
                'name':display,
                'file':'images/'+fname,
                'wiki_url':final_wiki,
                'wiki_matched':wiki_ok,
                'source_render_file':p.name,
                'render_source':'arkutils/species-images (MIT)'
              })

          summary={'packaged':len(manifest),'wiki_matched':sum(1 for x in manifest if x['wiki_matched']),'wiki_unmatched':len(wiki_unmatched)}
          (OUT/'creature_manifest.json').write_text(json.dumps(manifest,indent=2,ensure_ascii=False),encoding='utf-8')
          (OUT/'wiki_unmatched.json').write_text(json.dumps(wiki_unmatched,indent=2,ensure_ascii=False),encoding='utf-8')
          (OUT/'build_summary.json').write_text(json.dumps(summary,indent=2),encoding='utf-8')
          (OUT/'ATTRIBUTION.md').write_text('''# LakWatch Creature Assets\n\nClean ARK: Survival Ascended species renders are sourced from `arkutils/species-images`; its README states contributed images are available under the MIT License. Each entry includes its ARK Official Community Wiki match URL in `creature_manifest.json`.\n\nThe pack deliberately uses clean species renders rather than dossier pages or gameplay screenshots. Images are normalized to 512×512 lossless WebP with transparent padding and no destructive cropping.\n''',encoding='utf-8')
          print(json.dumps(summary,indent=2))
          if len(manifest)<100:
              raise RuntimeError(f'Unexpectedly low ASA render count: {len(manifest)}')
          shutil.make_archive('lakwatch_creature_assets','zip',OUT)
          PY
          python /tmp/build_assets.py
      - name: Upload ZIP
        uses: actions/upload-artifact@v4
        with:
          name: lakwatch_creature_assets
          path: lakwatch_creature_assets.zip
          if-no-files-found: error
          retention-days: 1
